name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      # Syntax / require-graph check on every JS file outside node_modules.
      # Cheap, catches typos and broken imports without booting the app.
      - name: Syntax check
        run: |
          find . -name 'node_modules' -prune -o -name '*.js' -print \
            | xargs -P 4 -n 50 node --check

      - name: Unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-used-in-prod
          JWT_REFRESH_SECRET: ci-test-refresh-secret-not-used-in-prod

      - name: Audit (high+ only — informational, never fails the build)
        run: npm audit --omit=dev --audit-level=high || true

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      # Lint is informational right now (pre-existing tech-debt errors).
      # When the codebase is clean, drop continue-on-error to gate on it.
      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true

      - run: npm run build

      - name: Audit (high+ only — informational, never fails the build)
        run: npm audit --omit=dev --audit-level=high || true

  frontend-admin:
    name: frontend-admin (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true

      - run: npm run build

      - name: Audit (high+ only — informational, never fails the build)
        run: npm audit --omit=dev --audit-level=high || true
