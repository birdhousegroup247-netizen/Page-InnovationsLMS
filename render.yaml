# Render.com Deployment Configuration
# This file defines all services for TekyPro LMS

services:
  # Backend API Service
  - type: web
    name: tekypro-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: tekypro-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: tekypro-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tekypro-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: tekypro-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: tekypro-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tekypro-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: REDIS_ENABLED
        value: false
      - key: FRONTEND_URL
        value: https://tekypro-student.onrender.com
      - key: ADMIN_FRONTEND_URL
        value: https://tekypro-admin.onrender.com

  # Student/Instructor Frontend
  - type: web
    name: tekypro-student
    env: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://tekypro-api.onrender.com

  # Admin Frontend
  - type: web
    name: tekypro-admin
    env: static
    region: oregon
    buildCommand: cd frontend-admin && npm install && npm run build
    staticPublishPath: frontend-admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://tekypro-api.onrender.com

databases:
  # PostgreSQL Database (Free Tier)
  - name: tekypro-db
    databaseName: tekypro_lms
    plan: free
    region: oregon
