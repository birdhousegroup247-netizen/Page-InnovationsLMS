# ============================================================================
# TekyPro LMS - Docker Compose Configuration
# For local development and testing
# ============================================================================
# SECURITY WARNING: Always use strong passwords via environment variables
# NEVER use the default fallback values in production!
# ============================================================================

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: tekypro_mysql
    restart: unless-stopped
    environment:
      # SECURITY: Set these in .env file - fallback values are for dev ONLY
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Error: DB_ROOT_PASSWORD not set in environment}
      MYSQL_DATABASE: ${DB_NAME:-tekypro_lms}
      MYSQL_USER: ${DB_USER:?Error: DB_USER not set in environment}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Error: DB_PASSWORD not set in environment}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - tekypro_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tekypro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # SECURITY: Redis with password authentication
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?Error: REDIS_PASSWORD not set in environment}
    volumes:
      - redis_data:/data
    networks:
      - tekypro_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tekypro_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-tekypro_lms}
      DB_USER: ${DB_USER:-teky_user}
      DB_PASSWORD: ${DB_PASSWORD:-teky_password}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Error: REDIS_PASSWORD not set in environment}
      JWT_SECRET: ${JWT_SECRET:?Error: JWT_SECRET not set in environment}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Error: JWT_REFRESH_SECRET not set in environment}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL:-http://localhost:5174}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tekypro_network
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Student Portal)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tekypro_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    depends_on:
      - backend
    networks:
      - tekypro_network

  # Admin Frontend
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: tekypro_admin
    restart: unless-stopped
    ports:
      - "5174:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    depends_on:
      - backend
    networks:
      - tekypro_network

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: tekypro_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - tekypro_network
    depends_on:
      - backend

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: tekypro_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      # SECURITY: Set strong password in .env file
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Error: GRAFANA_PASSWORD not set in environment}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - tekypro_network
    depends_on:
      - prometheus

networks:
  tekypro_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
